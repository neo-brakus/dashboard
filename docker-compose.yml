# docker-compose.yml

services:

  # --- Observability stack ---

  prometheus:
    image: prom/prometheus:v3.4.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-remote-write-receiver  # Required to accept metrics pushed by Alloy.
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.7.2
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo-config.yml
    # /ready returns 200 once Tempo has opened its receivers.
    # app depends_on this so traces aren't dropped during startup.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:12.0.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_DOMAIN=localhost
      - GF_METRICS_ENABLED=true
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:v1.8.3
    restart: unless-stopped
    ports:
      - "12345:12345"  # Alloy UI + /-/ready health endpoint
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Required for Docker log discovery.
      - /var/log/auth.log:/var/log/auth.log:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
      - tempo
      - prometheus
      - nginx
    networks:
      - monitoring
      - backend  # Bridges both networks, receives traces from backend, forwards to monitoring.

  # --- Exporters ---

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD:-demo}@postgres:5432/${POSTGRES_DB:-demodb}?sslmode=disable"
    volumes:
      - ./db/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    command:
      - "--collector.stat_statements"
      - "--extend.query-path=/etc/postgres_exporter/queries.yaml"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring
      - backend

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    pid: host  # Required to read host-level process metrics from /proc.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev:/run/udev:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --path.udev.data=/run/udev
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - monitoring

  # --- Application stack ---

  app:
    build: ./app
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - OTEL_SERVICE_NAME=dashboard-app
      - OTEL_RESOURCE_ATTRIBUTES=service.version=1.0.0,deployment.environment=development
      # Traces route through Alloy rather than directly to Tempo.
      # 'alloy' resolves on the backend network - no monitoring network needed on this service.
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://alloy:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo}
      POSTGRES_DB: ${POSTGRES_DB:-demodb}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    # pg_stat_statements required by postgres-exporter query tracking.
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c pg_stat_statements.max=10000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - backend

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  postgres_data:

networks:
  monitoring:
    driver: bridge
  backend:
    driver: bridge