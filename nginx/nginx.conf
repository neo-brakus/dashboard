# monitoring/nginx/nginx.conf

events {
  worker_connections 1024;
}

http {
  # snake_case field names match LogQL label conventions.
  # All upstream timing fields are included for latency percentile panels in Grafana.
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"remote_user":"$remote_user",'
      '"method":"$request_method",'
      '"uri":"$uri",'
      '"args":"$args",'
      '"http_version":"$server_protocol",'
      '"status":"$status",'
      '"bytes_received":"$request_length",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"http_x_forwarded_for":"$http_x_forwarded_for",'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_connect_time":"$upstream_connect_time",'
      '"upstream_response_time":"$upstream_response_time",'
      '"upstream_status":"$upstream_status"'
    '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log  warn;

  sendfile            on;
  keepalive_timeout   65;
  client_max_body_size 10m;

  server {
    listen 80;

    location / {
      proxy_pass         http://app:5000;
      proxy_http_version 1.1;

      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";  # Clears connection header for upstream keepalive.

      # Proxy timeouts are shorter than keepalive_timeout so nginx returns 504
      # before the client connection drops.
      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
      proxy_send_timeout    60s;
    }
  }
}